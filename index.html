<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
    <!-- এখানে CSS লিঙ্ক করুন -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- লগইন সেকশন -->
    <div id="login-page" class="page">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
    </div>

    <!-- মেইন সাইট -->
    <div id="main-site" class="page" style="display: none;">
        <div class="admin-sidebar">
            <div class="admin-nav-item" onclick="showPage('dashboard')">Dashboard</div>
            <div class="admin-nav-item" onclick="showPage('orders')">Orders</div>
        </div>
        <div id="dashboard" class="content-section">Dashboard Content</div>
        <div id="orders" class="content-section" style="display: none;">Order List Content</div>
    </div>

    <!-- এখানে JS ফাইল লিঙ্ক করুন -->
    <script src="script.js"></script>
</body>
</html>
